name: hananote
description: A privacy-first health tracking app for HRT management.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  camera: any
  equatable: ^2.0.7
  fl_chart: any
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_local_notifications: any
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: any
  fpdart: any
  freezed_annotation: any
  get_it: ^8.0.2
  go_router: ^14.0.0
  injectable: ^2.5.0
  intl: any
  json_annotation: any
  local_auth: any
  path: any
  pointycastle: any
  sqflite_sqlcipher: any

dev_dependencies:
  bloc_test: any
  build_runner: any
  flutter_test:
    sdk: flutter
  freezed: any
  injectable_generator: any
  json_serializable: any
  mocktail: any
  very_good_analysis: any

flutter:
  uses-material-design: true
  generate: true  # For l10n
