name: hananote
description: A privacy-first health tracking app for HRT management.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.24.0"

dependencies:
  camera: ^0.11.0
  equatable: ^2.0.7
  fl_chart: ^0.70.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_local_notifications: ^18.0.0
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.2.0
  fpdart: ^1.1.0
  freezed_annotation: ^2.4.0
  get_it: ^8.0.2
  go_router: ^14.0.0
  injectable: ^2.5.0
  intl: any
  json_annotation: ^4.9.0
  local_auth: ^2.3.0
  path: any
  pointycastle: ^3.9.0
  sqflite_sqlcipher: ^3.1.0

dev_dependencies:
  bloc_test: any
  build_runner: ^2.4.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.0
  injectable_generator: ^2.7.0
  json_serializable: ^6.9.0
  mocktail: ^1.0.0
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true  # For l10n
