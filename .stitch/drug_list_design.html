<body class="font-body selection:bg-primary-fixed">

</div>
</div>
<span class="material-symbols-outlined text-outline-variant" data-icon="chevron_right">chevron_right</span>
</div>
</div>
<!-- Card 2 -->
<div class="group relative overflow-hidden active:scale-[0.98] transition-all duration-200">

</div>

</div>
</div>

<div class="absolute right-0 top-0 bottom-0 w-16 bg-error flex items-center justify-center rounded-r-xl">
<span class="material-symbols-outlined text-white" data-icon="delete">delete</span>
</div>
<!-- Main Card content (shifted left as visual hint) -->
<div class="bg-surface-container-lowest rounded-xl p-4 flex justify-between items-center relative z-10 translate-x-[-8px]">
