<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>库存管理 - HanaNote</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#e2bae1",
              "primary-container": "#ffb7c5",
              "tertiary-container": "#ffb9b0",
              "surface-tint": "#864e5a",
              "on-surface-variant": "#514345",
              "tertiary": "#ac332a",
              "on-secondary": "#ffffff",
              "surface-bright": "#fff8f1",
              "secondary-container": "#fcd3fb",
              "primary": "#864e5a",
              "outline-variant": "#d6c2c4",
              "outline": "#837375",
              "on-secondary-container": "#78587a",
              "surface-container-low": "#f9f3eb",
              "on-primary": "#ffffff",
              "background": "#fff8f1",
              "tertiary-fixed-dim": "#ffb4aa",
              "surface-variant": "#e8e1da",
              "surface-container": "#f4ede5",
              "tertiary-fixed": "#ffdad5",
              "primary-fixed": "#ffd9df",
              "on-secondary-fixed-variant": "#5a3c5d",
              "inverse-primary": "#fbb3c1",
              "secondary-fixed": "#ffd6fe",
              "on-tertiary": "#ffffff",
              "surface": "#fff8f1",
              "primary-fixed-dim": "#fbb3c1",
              "on-tertiary-container": "#9f2922",
              "on-background": "#1e1b17",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#360c19",
              "inverse-surface": "#33302b",
              "surface-dim": "#dfd9d1",
              "surface-container-high": "#eee7df",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "on-primary-container": "#7b4551",
              "surface-container-highest": "#e8e1da",
              "on-tertiary-fixed": "#410001",
              "on-tertiary-fixed-variant": "#8b1a16",
              "secondary": "#745475",
              "on-error": "#ffffff",
              "on-secondary-fixed": "#2b112f",
              "on-error-container": "#93000a",
              "on-surface": "#1e1b17",
              "on-primary-fixed-variant": "#6b3743",
              "inverse-on-surface": "#f7f0e8"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            background-color: #FFF8F1;
            font-family: 'Be Vietnam Pro', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .text-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background antialiased overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#FFF8F1]/80 backdrop-blur-xl flex items-center px-6 h-16 w-full">
<div class="flex items-center gap-4 w-full">
<button class="p-2 -ml-2 hover:bg-[#FFB7C5]/10 rounded-full transition-colors active:scale-95 duration-200 ease-out">
<span class="material-symbols-outlined text-[#864E5A]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-lg text-[#864E5A]">库存管理</h1>
</div>
</header>
<main class="pt-20 px-6 pb-24 max-w-[390px] mx-auto min-h-screen">
<!-- Summary Banner -->
<section class="mb-6">
<div class="bg-surface-container rounded-lg p-5 flex items-center gap-4 transition-transform active:scale-[0.98]">
<div class="w-10 h-10 rounded-full bg-tertiary-container flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary" data-icon="warning">warning</span>
</div>
<div>
<p class="text-tertiary font-headline font-semibold text-base">2 种药物库存不足</p>
<p class="text-on-surface-variant text-sm mt-0.5">请及时补充以确保连续用药</p>
</div>
</div>
</section>
<!-- Inventory List -->
<div class="space-y-4">
<!-- Card 1: Expanded Interaction -->
<article class="bg-surface-container-lowest rounded-lg overflow-hidden flex flex-col border-l-4 border-tertiary transition-all">
<div class="p-5 flex items-center justify-between">
<div class="flex flex-col">
<h3 class="text-headline font-bold text-on-surface text-lg">补佳乐 2mg</h3>
<p class="text-tertiary font-medium text-sm mt-1">剩余 8 天</p>
</div>
<div class="relative w-14 h-14">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-variant" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-width="4"></circle>
<circle cx="28" cy="28" fill="transparent" r="24" stroke="#AC332A" stroke-dasharray="150.8" stroke-dashoffset="120.6" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-tertiary">20%</span>
</div>
</div>
<!-- Expanded Area -->
<div class="px-5 pb-5 pt-2 bg-surface-container-low border-t border-outline-variant/10">
<div class="flex items-end gap-3 mt-2">
<div class="flex-1">
<label class="text-[10px] uppercase tracking-wider text-outline mb-1 block font-bold">补充量 (天)</label>
<input class="w-full bg-surface-container border-none rounded-lg h-11 px-4 text-on-surface focus:ring-2 focus:ring-primary text-sm transition-all outline-none" placeholder="输入天数" type="number"/>
</div>
<button class="bg-primary text-on-primary font-headline font-semibold px-6 h-11 rounded-full text-sm active:scale-95 transition-transform">
                            保存
                        </button>
</div>
</div>
</article>
<!-- Card 2 -->
<article class="bg-surface-container-lowest rounded-lg overflow-hidden border-l-4 border-tertiary transition-all active:scale-[0.98]">
<div class="p-5 flex items-center justify-between">
<div class="flex flex-col">
<h3 class="text-headline font-bold text-on-surface text-lg">螺内酯 50mg</h3>
<p class="text-tertiary font-medium text-sm mt-1">剩余 12 天</p>
</div>
<div class="relative w-14 h-14">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-variant" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-width="4"></circle>
<circle cx="28" cy="28" fill="transparent" r="24" stroke="#AC332A" stroke-dasharray="150.8" stroke-dashoffset="98.0" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-tertiary">35%</span>
</div>
</div>
</article>
<!-- Card 3 -->
<article class="bg-surface-container-lowest rounded-lg overflow-hidden transition-all active:scale-[0.98]">
<div class="p-5 flex items-center justify-between">
<div class="flex flex-col">
<h3 class="text-headline font-bold text-on-surface text-lg">雌二醇凝胶</h3>
<p class="text-on-surface-variant font-medium text-sm mt-1">剩余 24 天</p>
</div>
<div class="relative w-14 h-14">
<svg class="w-full h-full transform -rotate-90">
<circle class="text-surface-variant" cx="28" cy="28" fill="transparent" r="24" stroke="currentColor" stroke-width="4"></circle>
<circle cx="28" cy="28" fill="transparent" r="24" stroke="#864E5A" stroke-dasharray="150.8" stroke-dashoffset="52.8" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<span class="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-primary">65%</span>
</div>
</div>
</article>
<!-- Placeholder for additional items -->
<div class="pt-8 flex flex-col items-center opacity-20 select-none">
<span class="material-symbols-outlined text-4xl mb-2" data-icon="inventory_2">inventory_2</span>
<p class="text-sm font-medium">已显示全部库存</p>
</div>
</div>
</main>
<!-- FAB (Contextual for Inventory - Add New) -->
<div class="fixed bottom-8 right-6">
<button class="w-14 h-14 rounded-2xl bg-primary text-on-primary shadow-lg flex items-center justify-center active:scale-90 transition-all">
<span class="material-symbols-outlined text-2xl" data-icon="add">add</span>
</button>
</div>
<!-- Decoration element to mimic paper feel -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none z-[-1] overflow-hidden">
<div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -left-32 w-80 h-80 bg-secondary-container/10 rounded-full blur-3xl"></div>
</div>
</body></html>
