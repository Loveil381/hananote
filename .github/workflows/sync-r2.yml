name: Sync Release to Cloudflare R2

on:
  release:
    types: [published]

jobs:
  sync-to-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download APK from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"

          # Download the APK asset
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "*.apk" \
            --dir ./dist

          # Rename to standard name
          mv ./dist/*.apk "./dist/HanaNote-${TAG}.apk"

          # Generate version.json with file size
          NOTES=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body)
          APK_SIZE=$(stat -c%s "./dist/HanaNote-${TAG}.apk" 2>/dev/null || stat -f%z "./dist/HanaNote-${TAG}.apk")
          cat > ./dist/version.json << ENDJSON
          {
            "version": "${VERSION}",
            "url": "https://cdn.hrtyaku.com/hananote/HanaNote-${TAG}.apk",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "github_url": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "size": ${APK_SIZE}
          }
          ENDJSON

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: ./dist
          destination-dir: hananote
