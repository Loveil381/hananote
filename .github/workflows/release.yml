name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: dart analyze

      - name: Test
        run: flutter test

      - name: Build Release APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/HanaNote-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/HanaNote-${{ github.ref_name }}.apk
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Prepare R2 upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          mkdir -p ./dist
          cp build/app/outputs/flutter-apk/HanaNote-${TAG}.apk ./dist/

          APK_SIZE=$(stat -c%s "./dist/HanaNote-${TAG}.apk")
          NOTES=$(gh release view "$TAG" --repo "${{ github.repository }}" --json body -q .body 2>/dev/null || echo "")

          cat > ./dist/version.json << ENDJSON
          {
            "version": "${VERSION}",
            "url": "https://cdn.hrtyaku.com/hananote/HanaNote-${TAG}.apk",
            "notes": $(echo "$NOTES" | jq -Rs .),
            "github_url": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "size": ${APK_SIZE}
          }
          ENDJSON

      - name: Upload to Cloudflare R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: ./dist
          destination-dir: hananote
