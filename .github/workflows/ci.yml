name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          cache: true

      - run: flutter pub get

      - name: Analyze
        # Info-level lints are advisory; only warnings/errors gate the build.
        # Project has accumulated stylistic infos (doc comments, line length)
        # that don't reflect ship-quality. Run with --fatal-warnings instead.
        run: dart analyze --fatal-warnings

      - name: Test
        run: flutter test

      - name: Build APK (verify)
        run: flutter build apk --debug
