name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.4'
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: flutter test

      - name: Build APK (verify)
        run: flutter build apk --debug
