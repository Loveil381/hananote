<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="HanaNote - Privacy-first HRT health tracker">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="HanaNote">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>HanaNote</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Disable Flutter service worker to prevent it from intercepting
    // sqflite SharedWorker (sqflite_sw.js) and WASM (sqlite3.wasm) requests.
    // These files must load directly from the network.
    window.flutterConfiguration = {
      serviceWorkerSettings: {
        serviceWorkerVersion: null,
      },
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
