        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background font-body text-on-background selection:bg-primary-container min-h-screen flex flex-col items-center justify-between py-12 px-8 bg-petal-texture relative overflow-hidden">
<!-- Top AppBar (Identity Anchor) -->
<header class="fixed top-0 w-full z-50 flex justify-center items-center px-6 h-16 w-full bg-[#FFF8F1]/80 backdrop-blur-md">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[#864E5A] text-2xl" data-icon="spa">spa</span>
<span class="font-['Plus_Jakarta_Sans'] text-[#864E5A] font-semibold italic text-sm tracking-tight mt-0.5">花笺 HanaNote</span>
</div>
</header>
<!-- Content Spacer for Header -->
<div class="h-16"></div>
<!-- Main Entry Section -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-sm gap-12">
<!-- App Identity -->
<section class="text-center">
<div class="w-20 h-20 bg-surface-container-lowest rounded-xl flex items-center justify-center mx-auto mb-4 shadow-sm border border-outline-variant/10">
<span class="material-symbols-outlined text-[#FFB7C5] text-5xl" data-icon="spa" style="font-variation-settings: 'FILL' 1;">spa</span>
</div>
<h1 class="font-headline text-2xl font-bold tracking-tight text-primary">请输入密码</h1>
<p class="text-on-surface-variant text-sm mt-2 font-label">为了保护您的健康隐私，请验证身份</p>
</section>
<!-- PIN Input Field -->
<section class="flex gap-4 items-center justify-center">
<!-- First 3 filled -->
<div class="w-3.5 h-3.5 rounded-full bg-primary-container ring-4 ring-primary-container/20"></div>
<div class="w-3.5 h-3.5 rounded-full bg-primary-container ring-4 ring-primary-container/20"></div>
<div class="w-3.5 h-3.5 rounded-full bg-primary-container ring-4 ring-primary-container/20"></div>
<!-- Next 3 outlines -->
<div class="w-3.5 h-3.5 rounded-full border-2 border-outline-variant"></div>
<div class="w-3.5 h-3.5 rounded-full border-2 border-outline-variant"></div>
<div class="w-3.5 h-3.5 rounded-full border-2 border-outline-variant"></div>
</section>
<!-- Circular Keypad -->
<section class="grid grid-cols-3 gap-x-8 gap-y-6 w-full px-4">
<!-- Digits 1-9 -->
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">1</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">2</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">3</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">4</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">5</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">6</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">7</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">8</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">9</button>
<!-- Bottom Row: Empty - 0 - Fingerprint -->
<div class="w-16 h-16"></div>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-2xl font-headline font-medium text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">0</button>
<button class="w-16 h-16 rounded-full bg-surface-container-lowest flex items-center justify-center text-primary shadow-[0_4px_12px_rgba(255,183,197,0.15)] active:scale-90 transition-transform duration-200">
<span class="material-symbols-outlined text-3xl" data-icon="fingerprint">fingerprint</span>
</button>
</section>
<!-- Secondary Actions -->
<section class="w-full flex justify-between items-center px-6 mt-4">
<button class="text-sm font-label text-outline hover:text-primary transition-colors">忘记密码?</button>
<button class="flex items-center gap-2 text-outline hover:text-primary transition-colors group">
<span class="material-symbols-outlined text-xl group-hover:scale-110 transition-transform" data-icon="face">face</span>
</button>
</section>
</main>
<!-- Bottom Footer (Security Text) -->
<footer class="mt-auto pt-8 flex flex-col items-center gap-2">
<div class="flex items-center gap-1.5 text-outline-variant">
<span class="material-symbols-outlined text-xs" data-icon="encrypted" style="font-variation-settings: 'FILL' 1;">encrypted</span>
<span class="text-[10px] font-label uppercase tracking-widest">数据已加密保护</span>
</div>
<!-- Decorative Home Indicator Area for Mobile feel -->
<div class="w-32 h-1 bg-surface-container-high rounded-full mt-4 opacity-30"></div>
</footer>

</div>
